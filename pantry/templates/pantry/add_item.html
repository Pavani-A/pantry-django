<!DOCTYPE html>
<html>
<head>
    <title>Add Item</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        /* Navbar / Tabs */
        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            display: flex;
            gap: 20px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* Form Container */
        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>

    <!-- 🔹 Navigation Tabs -->
    <div class="navbar">
        <a href="/">📦 Item List</a>
        <a href="/add/">➕ Add Item</a>
    </div>

    <!-- 🔹 Form -->
    <div class="container">
        <h2>Add Item</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Item Name" required>

            <input type="number" name="quantity" placeholder="Quantity" required>

            <input type="datetime-local" name="exp_date" required>

            <button type="submit">Add Item</button>
        </form>
    </div>

</body>
</html>
