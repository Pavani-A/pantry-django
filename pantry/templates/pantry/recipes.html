<!DOCTYPE html>
<html>
<head>
    <title>Recipes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        /* 🔹 Navbar */
        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        /* 🔍 Search */
        .search-box {
            text-align: center;
            margin-top: 20px;
        }

        .search-box input {
            padding: 10px;
            width: 260px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        .search-box button {
            padding: 10px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .search-box button:hover {
            background: #c0392b;
        }

        /* 🔥 GRID LAYOUT */
        .container {
            width: 90%;
            margin: 30px auto;

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* 🎬 CARD */
        .card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        /* 🖼️ IMAGE */
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* 📌 TITLE */
        .card h3 {
            font-size: 16px;
            margin: 10px 0;
        }

        /* 🔘 BUTTON */
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 20px;
        }

        .btn:hover {
            background-color: #c0392b;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: gray;
        }
    </style>
</head>

<body>

    <!-- 🔹 Navbar -->
    <div class="navbar">
        <a href="/">🏠 Home</a>
        <a href="/view/">📦 Pantry</a>
        <a href="/add/">➕ Add Item</a>
        <a href="/recipes/">🍲 Recipes</a>
        <a href="/logout/">🚪 Logout</a>
    </div>

    <!-- 🔍 Search -->
    <div class="search-box">
        <form method="GET" action="/recipes/">
            <input type="text" name="ingredient" value="{{ ingredient }}"
                   placeholder="Enter ingredient (e.g., chicken)">
            <button type="submit">🔍 Search</button>
        </form>
    </div>

    <h1>🍲 Recipes using "{{ ingredient }}"</h1>

    <!-- 🔥 GRID -->
    <div class="container">

        {% if recipes %}
            {% for recipe in recipes %}
                <div class="card">

                    <img src="{{ recipe.strMealThumb }}" alt="recipe">

                    <h3>{{ recipe.strMeal }}</h3>

                    <a href="/recipe/{{ recipe.idMeal }}/" class="btn">
                        View Details
                    </a>

                </div>
            {% endfor %}
        {% else %}
            <p class="empty">No recipes found 😢</p>
        {% endif %}

    </div>

</body>
</html>
