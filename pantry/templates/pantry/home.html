<!DOCTYPE html>
<html>
<head>
    <title>Pantry Management</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 50px;
            width: 420px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: gray;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px 0;
            transition: 0.3s;
        }

        .login {
            background-color: #3498db;
            color: white;
        }

        .signup {
            background-color: #2ecc71;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .info {
            font-size: 14px;
            color: #777;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <p class="info"></p>
        <h1>🍱 Pantry Management</h1>

        <p class="subtitle">
            Manage your pantry items, track quantities, and never miss expiry dates.
        </p>

        <!-- 🔥 Correct flow buttons -->
        <a href="/login/" class="btn login">🔐 Login</a>
        <a href="/signup/" class="btn signup">📝 Sign Up</a>

    </div>

</body>
</html>
