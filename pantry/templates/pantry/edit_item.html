<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="/">🏠 Home</a>
        <a href="/view/">📦 View Items</a>
        <a href="/add/">➕ Add Item</a>
    </div>

    <div class="container">
        <h2>✏️ Edit Item</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" value="{{ item.name }}" required>

            <input type="number" name="quantity" value="{{ item.quantity }}" required>

            <input type="datetime-local"
                   name="exp_date"
                   value="{{ item.exp_date|date:'Y-m-d\\TH:i' }}"
                   required>

            <button type="submit">Update Item</button>
        </form>
    </div>

</body>
</html>
